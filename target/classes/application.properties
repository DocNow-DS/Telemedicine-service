# Server settings
server.port=${SERVER_PORT:8083}

# MongoDB settings
# Prefer SPRING_DATA_MONGODB_URI. Also support MONGODB_URI for local/dev convenience.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:mongodb+srv://dbuser:dbuser2026@test.ubtlnvl.mongodb.net/clinic?appName=TEST}}

# JWT settings
jwt.secret=${JWT_SECRET:dev-secret-change-me}
# 1 day in milliseconds (kept for parity with Admin service)
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Telemedicine uses JWT-only authentication; disable Spring Boot's default in-memory user.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Service Integration
appointment-service.url=${APPOINTMENT_SERVICE_URL:http://localhost:8081/api/appointment}

# Jitsi configuration
# For direct Jitsi Meet usage, keep magic cookie empty.
vpaas.base-url=${VPAAS_BASE_URL:https://meet.jit.si}
vpaas.magic-cookie=${VPAAS_MAGIC_COOKIE:}

# Telemedicine flow toggles
# Set to true when appointment microservice is available and should be enforced.
telemedicine.appointment-validation.enabled=${TELEMEDICINE_APPOINTMENT_VALIDATION_ENABLED:false}
# Optional strict mode: verify both patient IDs exist in user_projection and are enabled.
telemedicine.patient-id-check.enabled=${TELEMEDICINE_PATIENT_ID_CHECK_ENABLED:false}

# RabbitMQ (event-driven integration)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

healthcare.user-events.exchange=${USER_EVENTS_EXCHANGE:healthcare.user.events}
healthcare.user-events.queue=${USER_EVENTS_QUEUE:telemedicine.user.events}
healthcare.user-events.enabled=${USER_EVENTS_ENABLED:false}

# Logging
logging.level.com.healthcare.telemedicine=DEBUG
logging.level.org.mongodb.driver.cluster=WARN
