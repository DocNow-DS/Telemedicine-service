services:
  telemedicine-service:
    build: .
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb+srv://dbuser:dbuser2026@test.ubtlnvl.mongodb.net/clinic?appName=TEST
      - APPOINTMENT_SERVICE_URL=http://appointment-service:8081/api/appointment
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      - USER_EVENTS_EXCHANGE=healthcare.user.events
      - USER_EVENTS_QUEUE=telemedicine.user.events
      - USER_EVENTS_ENABLED=true
    depends_on:
      - rabbitmq

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mongo-data:
