apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine-service
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine-service
  template:
    metadata:
      labels:
        app: telemedicine-service
    spec:
      containers:
        - name: telemedicine-service
          image: telemedicine-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: telemedicine-config
            - secretRef:
                name: telemedicine-secret
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine-service
  namespace: healthcare
spec:
  type: NodePort
  selector:
    app: telemedicine-service
  ports:
    - port: 8083
      targetPort: 8083
      nodePort: 30083
